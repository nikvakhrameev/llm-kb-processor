name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest tests/ -v

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: |
          repo_lc="${IMAGE_NAME,,}"
          echo "repo_lc=${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${REGISTRY}/${repo_lc}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.repo_lc }}
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Write .env.docker on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: |
            DEEPSEEK_API_KEY,TELEGRAM_BOT_TOKEN,
            ALLOWED_USER_IDS,OWNER_CHAT_ID,KB_GIT_SSH_KEY
          script: |
            cat > ${{ secrets.VPS_DEPLOY_PATH }}/.env.docker <<ENV_EOF
            # --- DeepSeek ---
            DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
            DEEPSEEK_MODEL=deepseek-v4-flash

            # --- claude-agent-sdk pointed at DeepSeek ---
            ANTHROPIC_BASE_URL=https://api.deepseek.com/v1/antropic
            ANTHROPIC_AUTH_TOKEN=${DEEPSEEK_API_KEY}
            CLAUDE_AGENT_PRO_MODEL=deepseek-v4-pro
            CLAUDE_AGENT_SMALL_MODEL=deepseek-v4-flash

            # --- Telegram ---
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            ALLOWED_USER_IDS=${ALLOWED_USER_IDS}
            OWNER_CHAT_ID=${OWNER_CHAT_ID}

            # --- Paths (always in-container defaults) ---
            STATE_DB=/data/state.db
            KB_ROOT=/wiki

            # --- Tuning ---
            POLL_INTERVAL_SECONDS=2
            GATE_ACCEPT_THRESHOLD=60
            INGEST_TIMEOUT_SECONDS=600
            INGEST_MAX_TURNS=25
            LINT_MAX_TURNS=40
            SYNTHESIS_MAX_TURNS=60
            RETRIES_MAX=3
            RETRY_BACKOFF_BASE_SECONDS=60
            SWEEPER_STUCK_MINUTES=30

            # --- Cron ---
            LINT_HOUR=2
            LINT_MINUTE=0
            SYNTHESIS_DAY=sun
            SYNTHESIS_HOUR=9
            SYNTHESIS_MINUTE=0
            TZ=Europe/Berlin

            # --- Git ---
            KB_GIT_AUTOPUSH=true
            KB_GIT_SSH_KEY=${KB_GIT_SSH_KEY}
            ENV_EOF

      - name: Pull image and restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GITHUB_SHA,GITHUB_REPOSITORY
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "${DEPLOY}"
            export STATE_DB_DIR="${DEPLOY}/data"
            export WIKI_DIR="${DEPLOY}/wiki"
            mkdir -p "${STATE_DB_DIR}"
            repo_lc=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
            export IMAGE="ghcr.io/${repo_lc}:sha-${GITHUB_SHA}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
