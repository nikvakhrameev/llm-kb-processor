name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (empty = latest on branch)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Write .env.docker on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            cat > ${{ secrets.VPS_DEPLOY_PATH }}/.env.docker <<'ENV_EOF'
            # --- DeepSeek ---
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
            DEEPSEEK_MODEL=deepseek-v4-flash

            # --- claude-agent-sdk pointed at DeepSeek ---
            ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic
            ANTHROPIC_AUTH_TOKEN=${{ secrets.DEEPSEEK_API_KEY }}
            CLAUDE_AGENT_PRO_MODEL=deepseek-v4-pro
            CLAUDE_AGENT_SMALL_MODEL=deepseek-v4-flash

            # --- Telegram ---
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            ALLOWED_USER_IDS=${{ secrets.ALLOWED_USER_IDS }}
            OWNER_CHAT_ID=${{ secrets.OWNER_CHAT_ID }}

            # --- Paths (always in-container defaults) ---
            STATE_DB=/data/state.db
            KB_ROOT=/wiki

            # --- Tuning ---
            POLL_INTERVAL_SECONDS=2
            GATE_ACCEPT_THRESHOLD=60
            INGEST_TIMEOUT_SECONDS=600
            INGEST_MAX_TURNS=25
            LINT_MAX_TURNS=40
            SYNTHESIS_MAX_TURNS=60
            RETRIES_MAX=3
            RETRY_BACKOFF_BASE_SECONDS=60
            SWEEPER_STUCK_MINUTES=30

            # --- Cron ---
            LINT_HOUR=2
            LINT_MINUTE=0
            SYNTHESIS_DAY=sun
            SYNTHESIS_HOUR=9
            SYNTHESIS_MINUTE=0
            TZ=Europe/Berlin

            # --- Git ---
            KB_GIT_AUTOPUSH=true
            KB_GIT_SSH_KEY=${{ secrets.KB_GIT_SSH_KEY }}
            KB_GIT_REMOTE=${{ secrets.KB_GIT_REMOTE }}
            ENV_EOF

      - name: Pull image and restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "${DEPLOY}"
            export STATE_DB_DIR="${DEPLOY}/data"
            export WIKI_DIR="${DEPLOY}/wiki"
            mkdir -p "${STATE_DB_DIR}"
            mkdir -p "${WIKI_DIR}"
            repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            TAG="${{ github.event.inputs.image_tag }}"
            if [ -z "${TAG}" ]; then
              TAG="sha-${{ github.sha }}"
            fi
            export IMAGE="ghcr.io/${repo_lc}:${TAG}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f